<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Equinext — Nifty 50 Research</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="dot"></span> Equinext</div>
    <input id="search" class="search" placeholder="Search stock…" autocomplete="off">
    <nav class="tabs">
      <button class="navtab active" data-view="stocks">Stocks</button>
      <button class="navtab" data-view="basket">Basket</button>
    </nav>
    <div class="asof" id="asof"></div>
  </header>

  <!-- STOCKS VIEW -->
  <div id="stocks-view" class="view">
    <aside class="sidebar" id="stocklist"></aside>
    <main class="detail" id="detail">
      <div class="empty">Select a stock…</div>
    </main>
  </div>

  <!-- BASKET VIEW -->
  <div id="basket-view" class="view" hidden>
    <div class="basket-wrap" id="basket"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Equinext — Nifty 50 Baskets & Research</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>
  <nav class="nav">
    <div class="logo"><span class="mark">E</span> Equinext</div>
    <div class="navtabs">
      <button class="navtab active" data-view="basket">Basket</button>
      <button class="navtab" data-view="compare">Compare All</button>
      <button class="navtab" data-view="stocks">Stocks</button>
    </div>
    <div class="search"><input id="search" placeholder="Search a stock…" autocomplete="off"></div>
  </nav>

  <!-- BASKET LANDING -->
  <div id="basket-view" class="view">
    <div class="wrap" id="basket"><div class="loading">Loading basket…</div></div>
  </div>

  <!-- COMPARE ALL 12 -->
  <div id="compare-view" class="view" hidden>
    <div class="wrap" id="compareall"><div class="loading">Loading comparison…</div></div>
  </div>

  <!-- STOCKS -->
  <div id="stocks-view" class="view" hidden>
    <div class="stocks">
      <aside class="sidebar">
        <div class="srch2"><input id="search2" placeholder="Search…" autocomplete="off"></div>
        <div id="stocklist"></div>
      </aside>
      <main class="detail" id="detail"><div class="empty">Select a stock to see its chart, technicals & fundamentals.</div></main>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
